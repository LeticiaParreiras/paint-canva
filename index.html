<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canva</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=brush" />
</head>
<body>
    <main>
        <div class="container">
            <div class="config">
                <div class="color">
                    <input type="color" name="colorPicker" id="colorPicker" >
                </div>
           
                <button id="brush" onclick="isErase(false)" class="btn-light">
                    <i class="fa-solid fa-paintbrush"></i>
                </button>
                <button  id="erase" onclick="isErase(true)">
                    <i class="fa-solid fa-eraser"></i>
                </button>
                <div>
                    <label for="brushSize">Brush Size: <span id="sizeLabel">5</span></label> 
                    <input type="range" name="brushSize" id="brushSize" min="5" max="100" value="5" step="5" >
                </div>
                <button onclick="undo()">
                    <i class="fa-solid fa-arrow-rotate-left"></i>
                </button>
                <button id="clearBtn"onclick="cleanCanva()">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
                <button id="saveBtn" onclick="saveCanva()">
                    <i class="fa-solid fa-floppy-disk"></i>
                </button>
                <footer>
                    <p>made with ❤ by Leticia Parreiras</p>
                </footer>
            </div>
            <div id="draw-area">
                <canvas id="canva">
                </canvas>
            </div>

        </div>
        
    </main>
</body>
<script src="https://kit.fontawesome.com/47df3f4c1a.js" crossorigin="anonymous"></script>
<script src="script.js"></script>
</html>
